#CI workflow to build, test, and lint the CRUD app on a push or pull request
name: CI Pipeline
on:
  push:
    branches: [main] #trigger on pushes to main branch
  pull_request:
    branches: [main] #trigger on PRs to main branch
jobs:
  build:
    runs-on: ubuntu-latest #GitHub's free Linux runner
    steps:
      - uses: actions/checkout@v3 #Check out repository code
      - name: Set up Node.js #Install Node.js environment
      uses: actions/setup-node@v3
      with:
        node-version: '18' #Use Node.js for consistency
      - name: Cache Dependencies #Cache node_modules to speed up builds
      uses: actions/cache@v3
      with:
        path: ~/.npm #Cache npm's global cache
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }} #key-based OS and package-lock.json
      - run: npm ci #Install dependencies reliably using package-lock.json
      - run: npm test #Run tests defined in package.json
      - run: npm run lint #Run ESLint to ensure code quality