#CI workflow to build, test, and lint the CRUD app on a push or pull request
name: CI Pipeline
on:
  push:
    branches: [main] #Trigger on pushes to main branch
  pull_request:
    branches: [main] #Trigger on PRs to main branch
jobs:
  install:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 19.x, 20.x, 21.x, 22.x, 23.x, 24.x, 25.x] #Test multiple Node versions
        database: [postgres, mysql] #Test against different databases
    steps:
      - uses: actions/checkout@v3
      - name: Cache node_modules
        uses: actions/cache@v3
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
      - name: Build Docker image
        run: |
          DOCKER_BUILDKIT=1 docker build -t app:latest .
      - run: npm ci #Clean install of dependencies
  test:
    needs: install #This job depends on the completion of the install job
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 19.x, 20.x, 21.x, 22.x, 23.x, 24.x, 25.x] #Test multiple Node versions
        database: [postgres, mysql] #Test against different databases
    steps:
      - uses: actions/checkout@v3
      - name: Restore node_modules
        id: cache-test
        uses: actions/cache@v3
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
      - if: steps.cache-test.outputs.cache-hit != 'true'
        run: npm test #Run test suite
  lint:
    needs: install #This job depends on the completion of the install job but runs in parallel with test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 19.x, 20.x, 21.x, 22.x, 23.x, 24.x, 25.x] #Test multiple Node versions
        database: [postgres, mysql] #Test against different databases
    steps:
      - uses: actions/checkout@v3
      - name: Restore node_modules
        id: cache-lint
        uses: actions/cache@v3
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
      - if: steps.cache-lint.outputs.cache-hit != 'true'
        run: npm run lint #Run linting checks