steps:
  - id: fan-out
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        for NODE_VERSION in 18 19 20 21 22 23 24 25; do
          for DATABASE in postgres mysql mongodb; do
            gcloud builds submit \
              --config=cloudbuild.matrix.yaml \
              --substitutions=_NODE_VERSION=$$NODE_VERSION,_DATABASE=$$DATABASE \
              --async \
              .
          done
        done
    waitFor: ["-"]

  - id: build
    name: gcr.io/cloud-builders/docker
    args: [build, -t, "gcr.io/$PROJECT_ID/ci-demo-app:$COMMIT_SHA", .]
    waitFor: [fan-out]

  - id: push
    name: gcr.io/cloud-builders/docker
    args: [push, "gcr.io/$PROJECT_ID/ci-demo-app:$COMMIT_SHA"]
    waitFor: [build]

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    args:
      - gcloud
      - run
      - deploy
      - ci-demo-app
      - --image=gcr.io/$PROJECT_ID/ci-demo-app:$COMMIT_SHA
      - --region=us-west1
    waitFor: [push]

options:
  machineType: E2_MEDIUM
  logging: CLOUD_LOGGING_ONLY